<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #213e30; color: #e8e8e8; font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif; }
  .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .card { background: #1f1f1f; border: 1px solid #2e2e2e; border-radius: 16px; padding: 2rem 2.5rem 2.5rem; width: 100%; max-width: 400px; text-align: center; }
  .mode-tabs { display: flex; gap: 6px; background: #141414; border-radius: 10px; padding: 5px; margin-bottom: 2rem; }
  .mode-btn { flex: 1; padding: 7px 4px; font-size: 12px; font-weight: 500; border: none; border-radius: 7px; cursor: pointer; background: transparent; color: #888; transition: all 0.18s; letter-spacing: 0.02em; }
  .mode-btn.active { background: #2e2e2e; color: #e8e8e8; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #555; margin-bottom: 1rem; }
  .duration-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 0.5rem; }
  .dur-btn { padding: 8px 18px; font-size: 13px; font-weight: 500; border: 1px solid #2e2e2e; border-radius: 8px; cursor: pointer; background: transparent; color: #888; transition: all 0.18s; }
  .dur-btn.active { background: #2e2e2e; color: #e8e8e8; border-color: #3a3a3a; }
  .timer-display { margin: 2rem 0 1.5rem; }
  .time-text { font-size: 72px; font-weight: 300; letter-spacing: -2px; color: #e8e8e8; font-variant-numeric: tabular-nums; line-height: 1; }
  .progress-bar { height: 3px; background: #2a2a2a; border-radius: 2px; margin-bottom: 1.8rem; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; background: #e8e8e8; transition: width 1s linear; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 2rem; }
  .btn-main { padding: 12px 40px; font-size: 14px; font-weight: 500; border: none; border-radius: 10px; cursor: pointer; background: #e8e8e8; color: #191919; transition: all 0.15s; letter-spacing: 0.02em; }
  .btn-main:hover { background: #fff; }
  .btn-icon { width: 40px; height: 40px; border: 1px solid #2e2e2e; border-radius: 8px; cursor: pointer; background: transparent; color: #666; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .btn-icon:hover { background: #2a2a2a; color: #e8e8e8; }
  .divider { height: 1px; background: #252525; margin-bottom: 1.5rem; }
  .session-count { font-size: 12px; color: #555; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #333; display: inline-block; transition: background 0.3s; }
  .dot.done { background: #e8e8e8; }
  .mode-indicator { font-size: 12px; color: #555; margin-bottom: 0.4rem; }
</style>
</head>
<body>
<div class="wrap">
<div class="card">
  <div class="mode-tabs">
    <button class="mode-btn active" onclick="switchMode('focus')" id="tab-focus">Focus</button>
    <button class="mode-btn" onclick="switchMode('break')" id="tab-break">Break</button>
  </div>

  <div id="focus-options">
    <div class="section-label">Session length</div>
    <div class="duration-row">
      <button class="dur-btn active" onclick="setDuration(25*60, this)">25 min</button>
      <button class="dur-btn" onclick="setDuration(30*60, this)">30 min</button>
      <button class="dur-btn" onclick="setDuration(45*60, this)">45 min</button>
    </div>
  </div>
  <div id="break-options" style="display:none;">
    <div class="section-label">Break length</div>
    <div class="duration-row">
      <button class="dur-btn active" onclick="setDuration(5*60, this)">5 min</button>
      <button class="dur-btn" onclick="setDuration(10*60, this)">10 min</button>
      <button class="dur-btn" onclick="setDuration(15*60, this)">15 min</button>
      <button class="dur-btn" onclick="setDuration(20*60, this)">20 min</button>
    </div>
  </div>

  <div class="timer-display">
    <div class="mode-indicator" id="mode-label">Focus</div>
    <div class="time-text" id="display">25:00</div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:100%"></div></div>

  <div class="controls">
    <button class="btn-icon" onclick="resetTimer()" title="Reset">↺</button>
    <button class="btn-main" id="start-btn" onclick="toggleTimer()">Start</button>
    <button class="btn-icon" onclick="skipTimer()" title="Skip">→</button>
  </div>

  <div class="divider"></div>
  <div class="session-count">
    <span id="dot1" class="dot"></span>
    <span id="dot2" class="dot"></span>
    <span id="dot3" class="dot"></span>
    <span id="dot4" class="dot"></span>
    <span style="color:#444; margin-left:4px; font-size:11px;" id="cycle-label">0 / 4 sessions</span>
  </div>
</div>
</div>

<script>
let mode = 'focus';
let totalSeconds = 25 * 60;
let remaining = totalSeconds;
let running = false;
let interval = null;
let sessions = 0;


function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function updateDisplay() {
  document.getElementById('display').textContent = fmt(remaining);
  const pct = (remaining / totalSeconds) * 100;
  document.getElementById('progress').style.width = pct + '%';
}

function toggleTimer() {
  if (running) {
    clearInterval(interval);
    running = false;
    document.getElementById('start-btn').textContent = 'Resume';
  } else {
    running = true;
    document.getElementById('start-btn').textContent = 'Pause';
    interval = setInterval(() => {
      remaining--;
      updateDisplay();
      if (remaining <= 0) {
        clearInterval(interval);
        running = false;
        if (mode === 'focus') {
          sessions = Math.min(sessions + 1, 4);
          updateDots();
        }
        document.getElementById('start-btn').textContent = 'Start';
        playBeep();
        flashTitle();
      }
    }, 1000);
  }
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.8);
  } catch(e) {}
}

function flashTitle() {
  let i = 0;
  const orig = 'Pomodoro';
  const t = setInterval(() => {
    document.title = i % 2 === 0 ? '✅ Done!' : orig;
    i++;
    if (i > 6) { clearInterval(t); document.title = orig; }
  }, 600);
}

function resetTimer() {
  clearInterval(interval);
  running = false;
  remaining = totalSeconds;
  updateDisplay();
  document.getElementById('start-btn').textContent = 'Start';
}

function skipTimer() {
  clearInterval(interval);
  running = false;
  remaining = 0;
  updateDisplay();
  document.getElementById('start-btn').textContent = 'Start';
}

function setDuration(secs, btn) {
  totalSeconds = secs;
  remaining = secs;
  updateDisplay();
  const rows = btn.closest('#focus-options, #break-options');
  rows.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (running) { clearInterval(interval); running = false; document.getElementById('start-btn').textContent = 'Start'; }
}

function switchMode(m) {
  clearInterval(interval);
  running = false;
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + m).classList.add('active');
  document.getElementById('mode-label').textContent = m === 'focus' ? 'Focus' : 'Break';

  if (m === 'focus') {
    document.getElementById('focus-options').style.display = '';
    document.getElementById('break-options').style.display = 'none';
    const active = document.querySelector('#focus-options .dur-btn.active');
    totalSeconds = active ? parseInt(active.textContent) * 60 : 25*60;
  } else {
    document.getElementById('focus-options').style.display = 'none';
    document.getElementById('break-options').style.display = '';
    document.querySelectorAll('#break-options .dur-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('#break-options .dur-btn').classList.add('active');
    totalSeconds = 5 * 60;
  }

  remaining = totalSeconds;
  updateDisplay();
  document.getElementById('start-btn').textContent = 'Start';
}

function updateDots() {
  for (let i = 1; i <= 4; i++) {
    document.getElementById('dot' + i).classList.toggle('done', i <= sessions);
  }
  document.getElementById('cycle-label').textContent =
    sessions >= 4 ? '4 / 4 — great work!' : sessions + ' / 4 sessions';
}

updateDisplay();
</script>
</body>
</html>
